{% extends 'todo/base.html' %}

{% block content %}
<style>
    .edit-form {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 2rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        max-width: 500px;
        margin: 0 auto;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .edit-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }
</style>

<div class="edit-form">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Edit Task</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" value="{{ task.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" id="due_date" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}">
        </div>
        
        <div class="edit-actions">
            <button type="submit" class="btn btn-primary w-full">Save Changes</button>
            <a href="{% url 'task_list' %}" class="btn btn-outline w-full text-center" style="display: flex; align-items: center; justify-content: center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
