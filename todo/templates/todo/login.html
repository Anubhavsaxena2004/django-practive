{% extends 'todo/base.html' %}

{% block content %}
<style>
    .auth-container {
        background-color: rgba(255, 255, 255, 0.02);
        padding: 2.5rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        max-width: 450px;
        margin: 0 auto;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .auth-title {
        text-align: center;
        margin-bottom: 2rem;
        font-size: 1.8rem;
        color: var(--text-main);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .form-group input {
        width: 100%;
        padding: 0.75rem 1rem;
        background-color: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-main);
        transition: var(--transition);
        outline: none;
    }

    .form-group input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .auth-actions {
        margin-top: 2rem;
    }

    .auth-link {
        display: block;
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        transition: var(--transition);
    }

    .auth-link:hover {
        color: var(--primary-color);
    }
</style>

<div class="auth-container">
    <h2 class="auth-title">Welcome Back</h2>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Enter username">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password" style="background-color: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 0.75rem 1rem; border-radius: 8px; width: 100%; outline: none; transition: var(--transition);">
        </div>
        
        <div class="auth-actions">
            <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </div>
    </form>
    
    <a href="{% url 'register' %}" class="auth-link">Don't have an account? Register here</a>
</div>
{% endblock %}
